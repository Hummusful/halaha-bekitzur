<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הלאה בקיצור - Music News</title>

  <!-- Fonts & Theming -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* Light theme */
      --bg-primary: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 50%, #cbd5e1 100%);
      --bg-card: rgba(255, 255, 255, 0.7);
      --bg-toolbar: rgba(255, 255, 255, 0.8);
      --text-primary: #1e293b;
      --text-secondary: #475569;
      --text-meta: #94a3b8;
      --border-color: rgba(148, 163, 184, 0.2);
      --accent-gradient: linear-gradient(45deg, #3b82f6, #10b981, #06b6d4, #8b5cf6);
      --hover-bg: rgba(59, 130, 246, 0.1);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    [data-theme="dark"] {
      /* Dark theme */
      --bg-primary: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
      --bg-card: rgba(30, 41, 59, 0.8);
      --bg-toolbar: rgba(30, 41, 59, 0.9);
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-meta: #94a3b8;
      --border-color: rgba(148, 163, 184, 0.1);
      --accent-gradient: linear-gradient(45deg, #60a5fa, #34d399, #22d3ee, #a78bfa);
      --hover-bg: rgba(59, 130, 246, 0.2);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
    }

    body {
      font-family: 'Heebo', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      min-height: 100vh;
      color: var(--text-primary);
      line-height: 1.7;
      transition: all 0.3s ease;
    }

    .container { max-width: 1000px; margin: 0 auto; padding: 32px 24px; }

    .header { text-align: center; margin-bottom: 40px; padding: 32px 0; }

    .site-title {
      font-size: 3.2rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 12px;
      background: var(--accent-gradient);
      background-size: 300% 300%;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientShift 4s ease-in-out infinite;
      line-height: 1.1;
    }

    .subtitle { font-size: 1.1rem; color: var(--text-secondary); font-weight: 400; margin-bottom: 24px; }

    @keyframes gradientShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }

    /* Theme Toggle */
    .theme-controls {
      display: flex; justify-content: center; align-items: center; gap: 16px; margin-bottom: 32px;
    }
    .theme-toggle {
      background: var(--bg-toolbar);
      border: 1px solid var(--border-color);
      border-radius: 50px;
      padding: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      display: flex; align-items: center; gap: 8px;
    }
    .theme-toggle:hover { transform: translateY(-1px); box-shadow: var(--shadow); }

    /* Toolbar */
    .toolbar {
      display: flex; gap: 16px; align-items: center; justify-content: center;
      margin-bottom: 32px; flex-wrap: wrap;
      background: var(--bg-toolbar); padding: 20px; border-radius: 20px;
      backdrop-filter: blur(10px); border: 1px solid var(--border-color); box-shadow: var(--shadow);
    }
    .btn {
      border: 1px solid var(--border-color); background: transparent; color: var(--text-primary);
      padding: 12px 24px; border-radius: 50px; font-size: 0.95rem; font-weight: 500;
      cursor: pointer; transition: all .3s ease; font-family: inherit; position: relative; overflow: hidden;
    }
    .btn::before {
      content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
      background: var(--accent-gradient); transition: left 0.3s ease; z-index: -1;
    }
    .btn:hover::before, .btn.active::before { left: 0; }
    .btn:hover, .btn.active { color: white; transform: translateY(-2px); box-shadow: var(--shadow); border-color: transparent; }
    .btn:focus-visible { outline: 3px solid rgba(59,130,246,.4); outline-offset: 2px; }

    .search-container { flex: 1; max-width: 300px; position: relative; }
    .search-input {
      width: 100%; padding: 12px 48px 12px 20px; /* RTL: רווח מימין לאיקון */
      border: 1px solid var(--border-color); border-radius: 50px;
      background: var(--bg-card); color: var(--text-primary); font-family: inherit; font-size: 0.95rem;
      transition: all 0.3s ease; backdrop-filter: blur(10px);
    }
    .search-input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
    .search-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--text-meta); }

    /* Feed */
    .news-feed { display: grid; gap: 24px; }

    .news-item {
      background: var(--bg-card); backdrop-filter: blur(20px); border-radius: 24px; padding: 32px;
      border: 1px solid var(--border-color); transition: all 0.4s ease; position: relative; overflow: hidden;
      box-shadow: var(--shadow); content-visibility: auto; contain-intrinsic-size: 300px;
    }
    .news-item::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: var(--accent-gradient); opacity: 0; transition: opacity 0.4s ease;
    }
    .news-item:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04); }
    .news-item:hover::before { opacity: 1; }

    .news-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; gap: 16px; flex-wrap: wrap; }
    .news-meta { display: flex; gap: 12px; align-items: center; font-size: 0.9rem; color: var(--text-meta); }
    .language-badge { background: var(--accent-gradient); color: white; padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .source-tag { background: var(--hover-bg); color: var(--text-primary); padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 500; border: 1px solid var(--border-color); cursor: pointer; }

    .news-title {
      font-size: 1.4rem; font-weight: 700; margin-bottom: 16px; line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .news-title a { color: var(--text-primary); text-decoration: none; transition: all 0.3s ease; position: relative; }
    .news-title a::after { content: ''; position: absolute; width: 0; height: 2px; bottom: -2px; left: 0; background: var(--accent-gradient); transition: width 0.3s ease; }
    .news-title a:hover::after { width: 100%; }
    .news-title a:hover { background: var(--accent-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }

    .news-summary {
      color: var(--text-secondary); line-height: 1.8; margin-bottom: 20px; font-size: 1rem;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }

    .news-actions { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-color); }
    .news-date { color: var(--text-meta); font-size: 0.9rem; white-space: nowrap; }

    .action-buttons { display: flex; gap: 12px; }
    .action-btn {
      background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary);
      padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; transition: all 0.3s ease;
      display: flex; align-items: center; gap: 6px;
    }
    .action-btn:hover { background: var(--hover-bg); color: var(--text-primary); transform: translateY(-1px); }
    .action-btn.saved { background: var(--accent-gradient); color: white; border-color: transparent; }

    .empty-state { text-align: center; color: var(--text-secondary); padding: 80px 20px; }
    .empty-state h3 { font-size: 1.5rem; margin-bottom: 12px; color: var(--text-primary); }

    .error { color: #ef4444; }

    .loading-skeleton { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    .load-more-container { text-align: center; margin-top: 40px; }
    .load-more-btn {
      background: var(--accent-gradient); color: white; border: none; padding: 16px 32px; border-radius: 50px;
      font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; box-shadow: var(--shadow);
    }
    .load-more-btn:hover { transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); }
    .load-more-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    @media (max-width: 768px) {
      .container { padding: 20px 16px; }
      .site-title { font-size: 2.4rem; }
      .news-item { padding: 24px; backdrop-filter: blur(12px); }
      .news-header { flex-direction: column; align-items: flex-start; }
      .toolbar { padding: 16px; gap: 12px; }
      .search-container { max-width: 100%; order: -1; }
      .news-actions { flex-direction: column; align-items: flex-start; }
    }
    @media (max-width: 480px) {
      .site-title { font-size: 2rem; }
      .news-title { font-size: 1.2rem; }
      .toolbar { flex-direction: column; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>

<body data-theme="light">
  <div class="container">
    <header class="header" role="banner">
      <h1 class="site-title">הלאה בקיצור</h1>
      <p class="subtitle">Your Personal Music News Feed</p>
    </header>

    <div class="theme-controls">
      <button class="theme-toggle" id="themeToggle" aria-label="החלף ערכת צבעים">
        <span id="themeIcon">🌞</span>
        <span id="themeText">מצב בהיר</span>
      </button>
    </div>

    <div class="toolbar" role="toolbar" aria-label="News filters">
      <button class="btn active" data-filter="all" aria-pressed="true">הכול</button>
      <button class="btn" data-filter="HE" aria-pressed="false">ישראלי</button>
      <button class="btn" data-filter="EN" aria-pressed="false">בינלאומי</button>

      <div class="search-container">
        <div class="search-icon">🔍</div>
        <input
          type="search"
          class="search-input"
          placeholder="חפש חדשות מוזיקה..."
          id="searchInput"
          aria-label="חפש בחדשות"
        >
      </div>
    </div>

    <div class="news-feed" id="newsFeed" role="feed" aria-busy="true" aria-live="polite"></div>

    <div class="load-more-container" id="loadMoreContainer" style="display: none;">
      <button class="load-more-btn" id="loadMoreBtn">טען עוד חדשות</button>
    </div>
  </div>

  <script defer>
    // ====== CONFIG ======
    const WORKER_ENDPOINT = "https://music-agrragator.dustrial.workers.dev/";
    const BLOCKED_SOURCES = ["al jazeera"];
    const BLOCKED_DOMAINS = ["aljazeera.com"];

    // ====== STATE ======
    let currentFilter = "all";
    let searchQuery = "";
    let allItems = [];
    let filteredItems = [];
    let displayedItems = [];
    let itemsPerPage = 15;
    let currentPage = 1;
    let savedArticles = JSON.parse(localStorage.getItem('savedArticles') || '[]');
    let sourceTagsBound = false;

    // ====== THEME ======
    function initTheme() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.body.setAttribute('data-theme', savedTheme);
      updateThemeToggle(savedTheme);
    }
    function toggleTheme() {
      const currentTheme = document.body.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      document.body.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeToggle(newTheme);
    }
    function updateThemeToggle(theme) {
      const icon = document.getElementById('themeIcon');
      const text = document.getElementById('themeText');
      if (theme === 'dark') { icon.textContent = '🌙'; text.textContent = 'מצב כהה'; }
      else { icon.textContent = '🌞'; text.textContent = 'מצב בהיר'; }
    }
    document.addEventListener('click', (e) => {
      if (e.target.closest('#themeToggle')) toggleTheme();
    });

    // ====== FETCH ====== (עם פוליפיל timeout)
    async function fetchNews() {
      const controller = new AbortController();
      const tid = setTimeout(() => controller.abort(), 10000);
      try {
        const res = await fetch(WORKER_ENDPOINT, {
          headers: { accept: "application/json" },
          signal: controller.signal
        });
        if (!res.ok) throw new Error(`הצגה נכשלה: ${res.status}`);
        const data = await res.json();
        if (!Array.isArray(data)) throw new Error("תגובה לא תקינה מהשרת");
        return data.filter(isAllowed);
      } catch (error) {
        if (error.name === 'AbortError') throw new Error('הבקשה לא הסתיימה בזמן - נסה שוב');
        throw error;
      } finally {
        clearTimeout(tid);
      }
    }

    // ====== FILTERS & BALANCE ======
    function isAllowed(item) {
      const src = (item.source || "").toLowerCase();
      const host = (() => { try { return new URL(item.link).hostname.replace(/^www\./,""); } catch { return ""; } })();
      return !BLOCKED_SOURCES.some(b => src.includes(b)) && !BLOCKED_DOMAINS.some(d => host.endsWith(d));
    }

    function groupAndBalance(items) {
      const groups = {};
      for (const item of items) {
        const source = item.source || 'Unknown';
        (groups[source] ||= []).push(item);
      }
      const balanced = [];
      for (const source of Object.keys(groups)) {
        const top = groups[source]
          .sort((a,b) => new Date(b.date || 0) - new Date(a.date || 0))
          .slice(0, 4); // עד 4 פריטים למקור
        balanced.push(...top);
      }
      return balanced.sort((a,b) => new Date(b.date || 0) - new Date(a.date || 0));
    }

    function applyFilters(items, filter, query) {
      let res = items;
      if (filter !== "all") res = res.filter(x => (x.language || "").toUpperCase() === filter.toUpperCase());
      if (query.trim()) {
        const terms = query.toLowerCase().trim().split(/\s+/);
        res = res.filter(item => {
          const hay = [item.headline||'', item.summary||'', item.source||''].join(' ').toLowerCase();
          return terms.every(t => hay.includes(t));
        });
      }
      return res;
    }

    // ====== RENDER ======
    function card(story, index) {
      const isSaved = savedArticles.includes(story.link);
      return `
        <article class="news-item" role="article" style="animation-delay:${index*0.1}s">
          <div class="news-header">
            <div class="news-meta">
              <span class="language-badge">${sanitize(story.language || 'EN')}</span>
              <span class="source-tag">${sanitize(story.source || 'לא ידוע')}</span>
            </div>
          </div>
          <h2 class="news-title">
            <a href="${safeHref(story.link)}" target="_blank" rel="noopener noreferrer">
              ${sanitize(story.headline || 'כותרת לא זמינה')}
            </a>
          </h2>
          <p class="news-summary">
            ${sanitize(story.summary || 'תקציר לא זמין')}
          </p>
          <div class="news-actions">
            <div class="news-date" title="${new Date(story.date || Date.now()).toLocaleString('he-IL')}">
              ${formatDate(story.date)}
            </div>
            <div class="action-buttons">
              <button class="action-btn save-btn ${isSaved ? 'saved' : ''}" data-url="${story.link}" aria-label="${isSaved ? 'בטל שמירה' : 'שמור מאמר'}">
                <span>${isSaved ? '❤️' : '🤍'}</span>${isSaved ? 'נשמר' : 'שמור'}
              </button>
              <button class="action-btn share-btn" data-url="${story.link}" data-title="${sanitize(story.headline || '')}" aria-label="שתף מאמר">
                <span>📤</span>שתף
              </button>
            </div>
          </div>
        </article>
      `;
    }

    function renderItems(items, append = false) {
      const feed = document.getElementById('newsFeed');
      feed.setAttribute('aria-busy', 'false');

      if (!items.length) {
        if (!append) {
          const emptyMessage = searchQuery ? 'לא נמצאו תוצאות לחיפוש' : 'לא נמצאו ידיעות כרגע';
          feed.innerHTML = `
            <div class="empty-state">
              <h3>${emptyMessage}</h3>
              <p>${searchQuery ? 'נסה מילות חיפוש אחרות' : 'נסה לרענן בעוד רגע'}</p>
            </div>
          `;
        }
        return;
      }

      const itemsToShow = items.slice(0, currentPage * itemsPerPage);
      const hasMore = items.length > itemsToShow.length;

      if (!append) {
        feed.innerHTML = itemsToShow.map((item, i) => card(item, i)).join("");
      } else {
        const newItems = items.slice(displayedItems.length, itemsToShow.length);
        feed.insertAdjacentHTML('beforeend', newItems.map((item, i) => card(item, displayedItems.length + i)).join(""));
      }

      displayedItems = itemsToShow;

      // Load more
      const loadMoreContainer = document.getElementById('loadMoreContainer');
      const loadMoreBtn = document.getElementById('loadMoreBtn');
      if (hasMore && items.length > itemsPerPage) {
        loadMoreContainer.style.display = 'block';
        loadMoreBtn.disabled = false;
        loadMoreBtn.textContent = 'טען עוד חדשות';
      } else {
        loadMoreContainer.style.display = 'none';
      }

      bindActionButtons();
      bindSourceTags(); // ייקשר פעם אחת בלבד (מוגן בדגל)
    }

    // ====== INTERACTIONS ======
    function bindActionButtons() {
      // Save
      document.querySelectorAll('.save-btn').forEach(btn => {
        btn.onclick = (e) => {
          e.preventDefault();
          const url = btn.dataset.url;
          const isSaved = savedArticles.includes(url);

          if (isSaved) {
            savedArticles = savedArticles.filter(x => x !== url);
            btn.classList.remove('saved');
            btn.innerHTML = '<span>🤍</span>שמור';
            btn.setAttribute('aria-label', 'שמור מאמר');
            showToast('המאמר הוסר מהשמורים');
          } else {
            savedArticles.push(url);
            btn.classList.add('saved');
            btn.innerHTML = '<span>❤️</span>נשמר';
            btn.setAttribute('aria-label', 'בטל שמירה');
            showToast('המאמר נשמר למועדפים');
          }
          localStorage.setItem('savedArticles', JSON.stringify(savedArticles));
        };
      });

      // Share
      document.querySelectorAll('.share-btn').forEach(btn => {
        btn.onclick = async (e) => {
          e.preventDefault();
          const url = btn.dataset.url;
          const title = btn.dataset.title;

          if (navigator.share) {
            try { await navigator.share({ title, url }); }
            catch (err) { if (err.name !== 'AbortError') copyToClipboard(url); }
          } else {
            copyToClipboard(url);
          }
        };
      });

      // Load more
      const loadMoreBtn = document.getElementById('loadMoreBtn');
      if (loadMoreBtn) {
        loadMoreBtn.onclick = () => {
          currentPage++;
          renderItems(filteredItems, true);
        };
      }
    }

    function bindSourceTags() {
      if (sourceTagsBound) return;
      sourceTagsBound = true;

      document.addEventListener('click', (e) => {
        const sourceTag = e.target.closest('.source-tag');
        if (!sourceTag) return;

        e.preventDefault();
        const sourceName = sourceTag.textContent.trim();
        const searchInput = document.getElementById('searchInput');
        searchInput.value = `"${sourceName}"`;
        searchQuery = searchInput.value;
        currentPage = 1;
        applyFiltersAndRender();
        showToast(`מציג חדשות מ-${sourceName}`);
      });
    }

    function bindFilters(items) {
      allItems = items;

      document.querySelectorAll('.toolbar .btn').forEach(btn => {
        btn.onclick = () => {
          currentFilter = btn.dataset.filter || 'all';
          currentPage = 1;
          updateActiveButton();
          applyFiltersAndRender();
        };
      });

      const searchInput = document.getElementById('searchInput');
      let searchTimeout;
      searchInput.oninput = (e) => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
          searchQuery = e.target.value;
          currentPage = 1;
          applyFiltersAndRender();
        }, 300);
      };

      updateActiveButton();
      applyFiltersAndRender();
    }

    function applyFiltersAndRender() {
      filteredItems = applyFilters(allItems, currentFilter, searchQuery);
      displayedItems = [];
      renderItems(filteredItems);
    }

    function updateActiveButton() {
      document.querySelectorAll('.toolbar .btn').forEach(btn => {
        const active = btn.dataset.filter === currentFilter;
        btn.classList.toggle('active', active);
        btn.setAttribute('aria-pressed', String(active));
      });
    }

    function loading() {
      const feed = document.getElementById('newsFeed');
      feed.setAttribute('aria-busy', 'true');
      const skeleton = Array(6).fill(0).map((_, i) => `
        <div class="news-item loading-skeleton" style="animation-delay:${i*0.1}s">
          <div class="news-header">
            <div style="width: 120px; height: 20px; background: var(--border-color); border-radius: 10px;"></div>
            <div style="width: 80px; height: 20px; background: var(--border-color); border-radius: 10px;"></div>
          </div>
          <div style="width:100%; height: 24px; background: var(--border-color); border-radius: 4px; margin-bottom: 12px;"></div>
          <div style="width:80%; height: 20px; background: var(--border-color); border-radius: 4px; margin-bottom: 8px;"></div>
          <div style="width:60%; height: 20px; background: var(--border-color); border-radius: 4px;"></div>
        </div>
      `).join('');
      feed.innerHTML = skeleton;
    }

    // ====== UTILS ======
    function decodeEntities(str) {
      if (!str) return "";
      const el = document.createElement("textarea");
      el.innerHTML = str;
      return el.value.replace(/\u00a0/g, " ");
    }
    function stripHTML(s) { return (s || "").replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim(); }
    function escapeHtml(str) {
      return (str || "").replace(/[&<>"']/g, s => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[s]));
    }
    function sanitize(str) { return escapeHtml(stripHTML(decodeEntities(str || ""))); }
    function formatDate(dateString) {
      const date = new Date(dateString || Date.now());
      const now = new Date();
      const diffMs = now.getTime() - date.getTime();
      const mins = Math.floor(diffMs / 60000);
      if (mins < 1) return 'הרגע';
      if (mins < 60) return `לפני ${mins} ${mins === 1 ? 'דקה' : 'דקות'}`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `לפני ${hours} ${hours === 1 ? 'שעה' : 'שעות'}`;
      const days = Math.floor(hours / 24);
      if (days === 1) return 'אתמול';
      if (days < 7) return `לפני ${days} ימים`;
      return date.toLocaleDateString('he-IL', { day:'2-digit', month:'2-digit', year:'numeric' });
    }
    function safeHref(href) { try { return new URL(href).href; } catch { return '#'; } }
    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => showToast('הקישור הועתק ללוח'))
        .catch(() => showToast('שגיאה בהעתקת הקישור'));
    }
    function showToast(message) {
      const toast = document.createElement('div');
      toast.textContent = message;
      toast.style.cssText = `
        position: fixed; top: 20px; right: 20px;
        background: var(--accent-gradient); color: white;
        padding: 12px 20px; border-radius: 12px; z-index: 1000;
        font-weight: 500; box-shadow: var(--shadow);
        transform: translateX(100%); transition: transform 0.3s ease;
      `;
      document.body.appendChild(toast);
      requestAnimationFrame(() => { toast.style.transform = 'translateX(0)'; });
      setTimeout(() => { toast.style.transform = 'translateX(100%)'; setTimeout(() => toast.remove(), 300); }, 3000);
    }

    // ====== BOOT ======
    document.addEventListener('DOMContentLoaded', async () => {
      initTheme();
      try {
        loading();
        const raw = await fetchNews();
        const balanced = groupAndBalance(raw);
        bindFilters(balanced); // מפעיל כפתורים/חיפוש/Load-more
        // רינדור ראשון לפי המצב ההתחלתי
        const initial = applyFilters(balanced, currentFilter, searchQuery);
        filteredItems = initial;
        renderItems(initial);
      } catch (e) {
        const feed = document.getElementById('newsFeed');
        feed.setAttribute('aria-busy','false');
        feed.innerHTML = `
          <div class="empty-state">
            <h3 class="error">אירעה שגיאה</h3>
            <p>${sanitize(e.message || 'שגיאה לא צפויה')}</p>
          </div>
        `;
      }
    });
  </script>
</body>
</html>
